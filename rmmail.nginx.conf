server {
    listen 80;
    server_name mail.freedomlabs.in;

    location /api {
        proxy_pass http://127.0.0.1:8004/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 502 503 /maintenance.html;
    location = /maintenance.html {
        root /home/sasi/Desktop/dev/RM Orbit/public;
        internal;
    }

    location / {
        proxy_pass http://127.0.0.1:45004;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name auth.freedomlabs.in;

    location / {
        proxy_pass http://127.0.0.1:45101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
